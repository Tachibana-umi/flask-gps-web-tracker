<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>位置采集器</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>
    <h3>位置采集器</h3>
    <div id="map" style="height: 500px; margin-top: 10px;"></div>

    <script>
        // 初始化地图
        var map = L.map('map').setView([39.9042, 116.4074], 14); // 默认北京坐标
    
        // 添加瓦片图层
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        var marker = null;
        var pathLine = null;
        var pathCoordinates = [];
        
        function UpdateLocation(position) {
            var lat = position.coords.latitude;
            var lng = position.coords.longitude;
            console.log('当前位置：', lat, lng);
            
            // 添加坐标到路径数组
            pathCoordinates.push([lat, lng]);

            if (!marker) {
                // 创建一个新的标记
                marker = L.marker([lat, lng]).addTo(map).bindPopup('当前位置').openPopup();
                // 更新地图中心
                map.setView([lat, lng], 15);
            } else {
                // 更新现有标记的位置
                marker.setLatLng([lat, lng]);
            }

            if (!pathLine) {
                pathLine = L.polyline(pathCoordinates, {color: 'blue'}).addTo(map);
            } else {
                pathLine.setLatLngs(pathCoordinates);
            }
        }

        function handleLocationError(error) {
            switch(error.code) {
                case error.PERMISSION_DENIED:
                    console.error("用户拒绝了地理位置请求。");
                    break;
                case error.POSITION_UNAVAILABLE:
                    console.error("位置信息不可用。");
                    break;
                case error.TIMEOUT:
                    console.error("请求超时。");
                    break;
                default:
                    console.error("发生未知错误。");
                    break;
            }

            alert("无法获取位置信息，请检查浏览器设置并允许位置访问。");
        }

        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(UpdateLocation, handleLocationError, {
                enableHighAccuracy: true,
                maximumAge: 0
            });
        } else {
            alert("您的浏览器不支持地理位置功能。");
        }
    </script>
</body>
</html>
